# MkDocs Material configuration for GRADIEND docs
# Build: mkdocs build | mkdocs serve
# Requires: pip install mkdocs-material

site_name: GRADIEND
site_description: Gradient-based targeted feature learning within neural networks
site_url: https://github.com/aieng-lab/gradiend

theme:
  name: material
  language: en
  logo: img/gradiend-bw.svg
  favicon: img/gradiend-bw.svg
  features:
    - content.code.copy
    - content.code.annotate   # Hover/click markers in code blocks show rich content (links, tips)
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - admonition
  - pymdownx.details

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members: true
            separate_signature: true
            heading_level: 2

nav:
  - Home: index.md
  - Get started:
    - Installation: installation.md
    - Train your first GRADIEND Model: start.md
  - Tutorials:
    - Detailed workflow (overview): tutorials/detailed-workflow.md
    - Data generation: tutorials/data-generation.md
    - Training: tutorials/training.md
    - Evaluation (intra-model): tutorials/evaluation-intra-model.md
    - Model rewrite: tutorials/model-rewrite.md
    - Evaluation (inter-model): tutorials/evaluation-inter-model.md
  - Guides:
    - Core classes and use cases: guides/core-classes.md
    - Data handling: guides/data-handling.md
    - Pruning: guides/pruning-guide.md
    - Evaluation & visualization: guides/evaluation-visualization.md
    - Saving & loading: guides/saving-loading.md
    - Training arguments: guides/training-arguments.md
    - Decoder-only models: guides/decoder-only.md
    - Testing: guides/testing.md
  - Reference:
    - Examples: examples.md
    - API reference:
        - API overview: api/index.md
        - Models:
            - Overview: api/models/index.md
            - GradiendModel: api/models/GradiendModel.md
            - ParamMappedGradiendModel: api/models/ParamMappedGradiendModel.md
            - ModelWithGradiend: api/models/ModelWithGradiend.md
        - Data:
            - Overview: api/data/index.md
            - TextFilterConfig: api/data/TextFilterConfig.md
            - TextPredictionDataCreator: api/data/TextPredictionDataCreator.md
            - TextPreprocessConfig: api/data/TextPreprocessConfig.md
        - Training:
            - Overview: api/training/index.md
            - TrainingArguments: api/training/TrainingArguments.md
            - Trainer: api/training/Trainer.md
            - TextPredictionConfig: api/training/TextPredictionConfig.md
            - TextPredictionTrainer: api/training/TextPredictionTrainer.md
            - PrePruneConfig: api/training/PrePruneConfig.md
            - PostPruneConfig: api/training/PostPruneConfig.md
        - Evaluation:
            - Overview: api/evaluation/index.md
            - Evaluator: api/evaluation/Evaluator.md
            - EncoderEvaluator: api/evaluation/EncoderEvaluator.md
            - DecoderEvaluator: api/evaluation/DecoderEvaluator.md
            - Visualizer: api/evaluation/Visualizer.md
    - FAQ: faq.md
  - Project:
    - Publishing the documentation: publishing-docs.md

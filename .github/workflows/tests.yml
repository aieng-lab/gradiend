# Run unit tests from tests/ on push and pull_request.
# Excludes test_bench and example/dry runs. Skips slow and integration tests.
name: Unit tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docstring-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docstring Markdown list spacing
        run: python scripts/fix_docstring_markdown_lists.py --check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,recommended,data]"

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -m "not slow and not integration"

[pytest]
# Pytest configuration for GRADIEND tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    -m "not slow and not integration"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"'; may load HF models)
    integration: marks tests as integration tests (run actual training or real HF weights)
